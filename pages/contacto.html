<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://kit.fontawesome.com/29c3be7601.js" crossorigin="anonymous"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Alien+Block&family=Anton&family=Archivo+Black&family=Bungee&family=Cinzel:wght@400..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Gravitas+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,10OTH@456;567;678;789;890;999&display=swap");
  </style>
</head>

<body class="fondo">
  <header>
    <nav>
      <div class="logo">
        <h1 class="fotografia"><span> L&A </span> FOTOGRAFIA</h1>
        <a href="../pages/inicio.html">
          <img src="../assets/img/logo_medium.jpg" alt="Logo de L.A Fotografía" />
        </a>
      </div>
      <ul class="nav-links">
        <li><a class="nav-link" href="../pages/inicio.html">Inicio</a></li>
        <li><a class="nav-link" href="../pages/portafolio.html">Portafolio</a></li>
        <li><a class="nav-link" href="../pages/servicios.html">Servicios</a></li>
        <li><a class="nav-link" href="../pages/contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>
  <section class="contacto">
    <div class="contacto-grid">

      <div class="contacto-info">
        <a href="https://wa.me/5491167693654" target="_blank" class="contacto-card">
          <div class="contacto-icono icono-whatsapp"><i class="fa-brands fa-whatsapp"></i></div>
          <div class="contacto-texto">
            <span class="contacto-label">WHATSAPP</span>
            <span class="contacto-valor">+11 6769-3654</span>
          </div>
          <i class="fa-solid fa-arrow-right contacto-flecha"></i>
        </a>

        <a href="https://instagram.com/leo.adrifotografia" target="_blank" class="contacto-card">
          <div class="contacto-icono icono-instagram"><i class="fa-brands fa-instagram"></i></div>
          <div class="contacto-texto">
            <span class="contacto-label">INSTAGRAM</span>
            <span class="contacto-valor">@leo.adrifotografia</span>
          </div>
          <i class="fa-solid fa-arrow-right contacto-flecha"></i>
        </a>

        <a href="https://maps.google.com" target="_blank" class="contacto-card">
          <div class="contacto-icono icono-ubicacion"><i class="fa-solid fa-location-dot"></i></div>
          <div class="contacto-texto">
            <span class="contacto-label">UBICACIÓN</span>
            <span class="contacto-valor">Zona Sur, Buenos Aires, Argentina</span>
          </div>
          <i class="fa-solid fa-arrow-right contacto-flecha"></i>
        </a>

        <div class="mapa-wrapper">
          <a href="https://maps.google.com" target="_blank" class="mapa-link">Abrir en Maps <i
              class="fa-solid fa-arrow-up-right-from-square"></i></a>
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d105000!2d-58.5!3d-34.8!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzTCsDQ4JzAwLjAiUyA1OMKwMzAnMDAuMCJX!5e0!3m2!1ses!2sar!4v1000000000000"
            width="100%" height="280" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
      </div>

      <form class="contacto-form" id="form-contacto">
        <h2 class="form-titulo">Envianos un mensaje</h2>

        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required />
          </div>
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="+54 11 XXXX-XXXX" />
          </div>
          <div class="form-group">
            <label for="servicio">Tipo de Servicio *</label>
            <select id="servicio" name="servicio" required>
              <option value="" selected disabled>Seleccioná un servicio</option>
              <option value="Fotografía de Bodas">Fotografía de Bodas</option>
              <option value="Video Cinematográfico">Video Cinematográfico</option>
              <option value="Sesiones Personales">Sesiones Personales</option>
              <option value="Cumpleaños & Eventos">Cumpleaños & Eventos</option>
              <option value="Recién Nacidos">Recién Nacidos</option>
              <option value="Fotolibros & Álbumes">Fotolibros & Álbumes</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="fecha">Fecha del Evento</label>
          <input type="date" id="fecha" name="fecha" />
        </div>

        <div class="form-group">
          <label for="mensaje">Mensaje * <span class="contador">(<span
                id="contador-caracteres">0</span>/500)</span></label>
          <textarea id="mensaje" name="mensaje" maxlength="500" rows="5"
            placeholder="Contanos sobre tu evento, fecha, lugar y cualquier detalle importante..." required
            oninput="document.getElementById('contador-caracteres').textContent = this.value.length"></textarea>
        </div>

        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
      </form>

    </div>
  </section>
  <script>
    document.getElementById('form-contacto').addEventListener('submit', function (e) {
      e.preventDefault();

      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value;
      const telefono = document.getElementById('telefono').value;
      const servicio = document.getElementById('servicio').value;
      const fecha = document.getElementById('fecha').value;
      const mensaje = document.getElementById('mensaje').value;

      let texto = `Hola! Quiero consultar por una sesión de fotos.%0A%0A`;
      texto += `*Nombre:* ${nombre}%0A`;
      texto += `*Email:* ${email}%0A`;
      if (telefono) texto += `*Teléfono:* ${telefono}%0A`;
      texto += `*Servicio:* ${servicio}%0A`;
      if (fecha) texto += `*Fecha del evento:* ${fecha}%0A`;
      texto += `*Mensaje:* ${mensaje}`;

      const numeroWhatsapp = '5491167693654';
      const url = `https://wa.me/${numeroWhatsapp}?text=${texto}`;

      window.open(url, '_blank');
    });
  </script>
    <footer class="footer">
    <p>&copy; 2024 L&A Fotografía. Todos los derechos reservados.</p>
  </footer>
</body>
